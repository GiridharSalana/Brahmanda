<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanatan Cosmos - 3D Divine Hierarchy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loading-screen">
        <div class="loader">
            <div class="om-symbol">ॐ</div>
            <p>Loading Cosmic Realms...</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <span class="om">ॐ</span>
            <span class="title">SANATAN COSMOS</span>
        </div>
        <div class="nav-links">
            <button data-action="reset">Reset View</button>
            <button data-action="auto-rotate">Auto Rotate</button>
            <button data-action="expand">Expand All</button>
            <button data-action="help">Help</button>
        </div>
    </nav>

    <!-- Main 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- Level indicator -->
    <div class="level-indicator">
        <div class="level-name">Exploring the Cosmos</div>
        <div class="level-desc">Click on any sphere to explore</div>
    </div>

    <!-- Detail Panel (shown when clicking on nodes) -->
    <div class="detail-panel" id="detail-panel">
        <button class="close-btn" id="close-detail">×</button>
        <div class="detail-content">
            <h2 id="detail-title"></h2>
            <div id="detail-body"></div>
        </div>
    </div>

    <!-- Instructions overlay -->
    <div class="instructions" id="instructions">
        <div class="instruction-content">
            <h2>Welcome to Sanatan Cosmos</h2>
            <p>🖱️ <strong>Left Click + Drag:</strong> Rotate view</p>
            <p>🖱️ <strong>Scroll:</strong> Zoom in/out</p>
            <p>👆 <strong>Click Sphere:</strong> View details</p>
            <p>⌨️ <strong>Space:</strong> Toggle auto-rotate</p>
            <button id="got-it">Begin Journey</button>
        </div>
    </div>

    <!-- Mini-map for navigation -->
    <div class="mini-map">
        <svg width="200" height="400" id="mini-map-svg"></svg>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

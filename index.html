<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanatan Cosmos - 3D Divine Hierarchy</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loading-screen">
        <div class="loader">
            <div class="om-symbol">ॐ</div>
            <p>Loading Cosmic Realms...</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Centered Brand Header -->
    <header class="brand-header">
        <div class="brand-content">
            <span class="om">ॐ</span>
            <span class="title">SANATAN COSMOS</span>
        </div>
    </header>

    <!-- Main 3D Canvas - Full Screen -->
    <div id="canvas-container"></div>
    
    <!-- Floating Circular Control Panel -->
    <div class="control-orb">
        <button class="orb-toggle" id="orb-toggle" aria-label="Toggle controls">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
        
        <div class="control-ring" id="control-ring">
            <button class="control-btn" data-action="reset" title="Reset View">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                    <path d="M21 3v5h-5"/>
                </svg>
            </button>
            
            <button class="control-btn" data-action="auto-rotate" title="Auto Rotate">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                </svg>
            </button>
            
            <button class="control-btn" data-action="expand" title="Expand All">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
                </svg>
            </button>
            
            <button class="control-btn toggle-btn active" data-action="toggle-yugas" title="Yugas">Y</button>
            <button class="control-btn toggle-btn active" data-action="toggle-lokas" title="Lokas">L</button>
            <button class="control-btn toggle-btn active" data-action="toggle-avatars" title="Avatars">A</button>
            <button class="control-btn toggle-btn active" data-action="toggle-paths" title="Paths">P</button>
            
            <button class="control-btn" data-action="help" title="Help">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
            </button>
        </div>
    </div>
    
    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <!-- Detail Panel -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="audio-manager.js"></script>
    <script src="advanced-effects.js"></script>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanatan Cosmos - 3D Divine Hierarchy</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loading-screen">
        <div class="loader">
            <div class="om-symbol">ॐ</div>
            <p>Loading Cosmic Realms...</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Main 3D Canvas -->
    <div id="canvas-container"></div>
    
    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <!-- Detail Panel (shown when clicking on nodes) -->
    <div class="detail-panel" id="detail-panel">
        <button class="close-btn" id="close-detail">×</button>
        <div class="detail-content">
            <h2 id="detail-title"></h2>
            <div id="detail-body"></div>
        </div>
    </div>

    <!-- Instructions overlay -->
    <div class="instructions" id="instructions">
        <div class="instruction-content">
            <h2>Welcome to Sanatan Cosmos</h2>
            <p>🖱️ <strong>Left Click + Drag:</strong> Rotate view</p>
            <p>🖱️ <strong>Scroll:</strong> Zoom in/out</p>
            <p>👆 <strong>Click Sphere:</strong> View details</p>
            <p>⌨️ <strong>Space:</strong> Toggle auto-rotate</p>
            <button id="got-it">Begin Journey</button>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <span class="om">ॐ</span>
            <span class="title">SANATAN COSMOS</span>
        </div>
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-links" id="nav-links">
            <div class="nav-group">
                <button data-action="reset">Reset</button>
                <button data-action="auto-rotate">Rotate</button>
                <button data-action="expand">Expand</button>
            </div>
            <div class="nav-group toggles-group">
                <button data-action="toggle-yugas" class="toggle-btn active" title="Toggle Yuga Timeline">Yugas</button>
                <button data-action="toggle-lokas" class="toggle-btn active" title="Toggle Lokas">Lokas</button>
                <button data-action="toggle-avatars" class="toggle-btn active" title="Toggle Avatars">Avatars</button>
                <button data-action="toggle-paths" class="toggle-btn active" title="Toggle Moksha Paths">Paths</button>
            </div>
            <div class="nav-group">
                <button data-action="help">Help</button>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="audio-manager.js"></script>
    <script src="advanced-effects.js"></script>
    <script src="script.js"></script>
</body>
</html>

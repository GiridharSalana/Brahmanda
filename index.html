<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRAHMANDA — The Cosmic Egg · Sanatan Cosmology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- ░░ LOADING SCREEN ░░ -->
  <div id="loading">
    <div class="load-inner">
      <div class="load-om">ॐ</div>
      <div class="load-title">BRAHMANDA</div>
      <div class="load-sub">The Cosmic Egg &nbsp;·&nbsp; ब्रह्माण्ड</div>
      <div class="load-bar-wrap"><div id="load-bar"></div></div>
      <div id="load-text">Awakening the Cosmos…</div>
    </div>
  </div>

  <!-- ░░ 3D CANVAS ░░ -->
  <canvas id="c"></canvas>

  <!-- ░░ HEADER ░░ -->
  <header id="hdr">
    <div class="hdr-brand">
      <span class="hdr-om">ॐ</span>
      <div>
        <div class="hdr-title">BRAHMANDA</div>
        <div class="hdr-sub">Sanatan Cosmology</div>
      </div>
    </div>

    <nav id="nav">
      <button class="nb active" data-view="cosmos">Universe</button>
      <button class="nb" data-view="trimurti">Trimurti</button>
      <button class="nb" data-view="lokas">14 Lokas</button>
      <button class="nb" data-view="chakras">Chakras</button>
      <button class="nb" data-view="yugas">Kalachakra</button>
    </nav>

    <div class="hdr-actions">
      <button id="btn-tour" class="act-btn">&#9654; Tour</button>
      <button id="btn-reset" class="act-btn">&#x21BA; Reset</button>
    </div>
  </header>

  <!-- ░░ INFO SIDE-PANEL ░░ -->
  <aside id="panel">
    <button id="panel-close">&#x2715;</button>
    <div id="panel-cat"></div>
    <h2 id="panel-title"></h2>
    <div id="panel-sk"></div>
    <div class="panel-rule"></div>
    <div id="panel-body"></div>
  </aside>

  <!-- ░░ HOVER TOOLTIP ░░ -->
  <div id="tip"></div>

  <!-- ░░ CONTROLS HINT ░░ -->
  <div id="hint">Drag &middot; Scroll &middot; Click objects to explore the cosmos</div>

  <script type="module" src="script.js"></script>
</body>
</html>
